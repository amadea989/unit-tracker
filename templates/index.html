<!DOCTYPE html>
<html>
    <head>
        <title>Unit Tracker</title>
        <style>
            body { font-family: Arial; margin: 40px; }
            input, select, button {margin: 10px 0; padding: 8px; }
        </style>
    </head>
    <body>
        <h1>Unit progress tracker</h1>

        <h2>Add New Unit</h2>
        <form method="POST" action="/add">
            <input type="text" name="unit_name" placeholder="Unit Name" required ><br>
            <select name="status">
                <option value="Available">Available</option>
                <option value="Viewing">Viewing</option>
                <option value="Reserved">Reserved</option>
                <option value="Sold">Sold</option>
            </select><br>
            <button type="submit">Add Unit</button>
        </form>

        <h2>Current Units</h2>
        {% if units %}
        <table border="1" cellpadding ="10">
            <tr>
                <th> Unit Name</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            {% for unit in units %}
            <tr>
                <td>{{ unit.name}}</td>
                <td>{{ unit.status}}</td>
                <td>
                    <form method="POST" action="/update/{{ loop.index0 }}" style="display:inline">
                        <select name="new_status">
                            <option value = "Available">Available</option>
                            <option value = "Viewing">Viewing</option>
                            <option value = "Reserved">Reserved</option>
                            <option value = "Sold">Sold</option>
                        </select>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No units yet. Add one above!</p>
    {% endif %}
    </body>
</html>
