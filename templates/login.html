<!DOCTYPE html>
<html>
<head>
    <title>Login - Unit Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <h1>Unit Progress Tracker</h1>
                <p>Real Estate Management System</p>
            </div>
            
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            
            <form method="POST">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required autofocus>
                <button type="submit">Sign In</button>
            </form>
            
            <div class="footer-note">
                For demonstration: password is <strong>admin123</strong>
            </div>
        </div>
    </div>
</body>
</html>
