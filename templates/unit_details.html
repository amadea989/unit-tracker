<!DOCTYPE html>
<html>
<head>
    <title>Unit Details - {{ unit.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/unit_details.css') }}">
</head>
<body>
    <div class="container">
        <div class="back-nav">
            <a href="/" class="back-link">Back to Dashboard</a>
        </div>
        
        <div class="details-card">
            <div class="header">
                <h1>{{ unit.name }}</h1>
                <p class="project-name">Project: {{ project.name }}</p>
                <span class="status-badge status-{{ unit.status|lower }}">{{ unit.status }}</span>
            </div>

            <form method="POST" action="/update_details/{{ unit.id }}">
                
                {% if unit.status == 'Sold' %}
                <div class="section">
                    <h2>Buyer Information</h2>
                    
                    <label>Buyer Name</label>
                    <input type="text" name="buyer_name" value="{{ unit.buyer_name or '' }}" placeholder="Full name of buyer">
                    
                    <label>Phone Number</label>
                    <input type="text" name="buyer_phone" value="{{ unit.buyer_phone or '' }}" placeholder="+230 XXXX XXXX">
                    
                    <label>Email Address</label>
                    <input type="email" name="buyer_email" value="{{ unit.buyer_email or '' }}" placeholder="buyer@example.com">
                    
                    <label>Sale Price</label>
                    <input type="text" name="sale_price" value="{{ unit.sale_price or '' }}" placeholder="MUR 5,000,000">
                </div>
                {% else %}
                <div class="section">
                    <div class="info-message">
                        Buyer information will be available once unit status is set to "Sold"
                    </div>
                </div>
                {% endif %}

                <div class="section">
                    <h2>Notes & Progress Updates</h2>
                    <label>Comments, Updates, or Additional Information</label>
                    <textarea name="notes" placeholder="Add notes about progress, issues, documents received, payments, etc.">{{ unit.notes or '' }}</textarea>
                </div>

                <button type="submit" class="save-btn">Save Changes</button>
            </form>
        </div>
    </div>
</body>
</html>
